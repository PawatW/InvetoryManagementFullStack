version: '3.8'

services:
  backend:
    build:
      context: ./demo1/demo
      dockerfile: Dockerfile
    container_name: Invmanagement-backend
    restart: always  # เพิ่มเพื่อให้ระบบรันใหม่เองหากพัง
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/Invmanagement
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD} # ดึงจาก .env หรือ System Env
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      db:
        condition: service_healthy # รอให้ DB พร้อมจริงๆ ก่อนรัน Backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: Invmanagement-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # *** ต้องเปลี่ยนเป็น Domain หรือ IP จริงของ Backend สำหรับคนใช้งานผ่าน Browser ***
      - NEXT_PUBLIC_API_URL=https://your-api-url.com 
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: Invmanagement-db
    restart: always
    environment:
      - POSTGRES_DB=Invmanagement
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    # ports: - "5432:5432" # แนะนำให้ปิดพอร์ตนี้บน Production
    healthcheck: # เพิ่มเพื่อให้ Backend รู้ว่า DB พร้อมทำงานจริงๆ
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
